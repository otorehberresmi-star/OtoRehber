<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OtoRehber - iOS ve Android</title>
  <meta name="description" content="OtoRehber iOS ve Android indirme QR kodları." />
  <link rel="canonical" href="https://oto-rehber.com/" />
  <link rel="icon" href="/assets/app-icon.png" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/assets/app-icon.png" alt="" />
      <span>OtoRehber</span>
    </a>
    <nav aria-label="Yasal bağlantılar">
      <a href="/destek/">Destek</a>
      <a href="/gizlilik/">Gizlilik</a>
      <a href="/kullanim-sartlari/">Şartlar</a>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1>OtoRehber'i telefonuna indir</h1>
      <p>iOS ve Android için QR kodu okut, araç yorumları, topluluklar ve garaj takibini cebine al.</p>
    </section>
    <section class="qr-grid" aria-label="Uygulama indirme bağlantıları">
      <article class="qr-card">
        <h2>iOS</h2>
        <p>App Store bağlantısı için QR kodu okut.</p>
        <img src="/assets/qr-ios.png" alt="OtoRehber iOS App Store QR kodu" />
        <a class="store-link" href="https://apps.apple.com/app/id6785478665">App Store'a Git</a>
      </article>
      <article class="qr-card">
        <h2>Android</h2>
        <p>Google Play bağlantısı için QR kodu okut.</p>
        <img src="/assets/qr-android.png" alt="OtoRehber Android Google Play QR kodu" />
        <a class="store-link" href="https://play.google.com/store/apps/details?id=com.otorehber.app">Google Play'e Git</a>
      </article>
    </section>
  </main>
</body>
</html>
